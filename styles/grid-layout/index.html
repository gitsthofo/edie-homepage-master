<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
     <title>Layout</title>



     <style>

        .wrapper{
       
            display: grid;
            height: 100vh;
           
            grid-template-columns: repeat(auto-fill, minmax(200px 1fr));
            grid-template-rows: 200px auto 200px;
            grid-template-areas:

            " s2 s2 s2 s1 s1 s1 s1 s1 s1 s1 s1 s1"
            " s2 s2 s2 s3 s3 s4 s4 s5 s5 s5 s5 s5"
            " s2 s2 s2 s3 s3 s4 s4 s5 s5 s5 s5 s5"
            " s2 s2 s2 s6 s6 s6 s6 s6 s6 s6 s6 s6";
        
            grid-gap: 2em;
            padding: 1em;
            margin-inline: auto; 
            background-color: rgb(22, 21, 21);
           
        }


        @media screen and (max-width: 800px){

            .wrapper{

                display: grid;
                grid-template-columns: repeat(2, 1fr );
                grid-template-rows: 200px auto 200px;
            

                
            grid-gap: 2em;
            padding: 1em;
            margin-inline: auto; 
            background-color: rgb(161, 39, 39);
           

            }
        }




        .wrapper > *{
            box-shadow: 0.1rem 0.1rem 1rem rgb(51, 54, 48);
            border-radius: 0.2rem;
        }



        .s1{
            grid-area: s1;
            background-color: orange; 
        }

        .s2{
            grid-area: s2;
            background-color: palegoldenrod;
        }

        .s3{
            grid-area: s3;
            background-color: blueviolet;
        
        }

        .s4{
            grid-area: s4;
            background-color: green;
        }

        .s5{
            grid-area: s5;
            background-color: red;
        }
        .s6{
            grid-area: s6;
            background-color: orange;
          
        }




     </style>
</head>
<body>

    <div class="wrapper">
        <section class="s1"><h1>My header</h1></section>
        <section class="s2">2</section>
        <section class="s3">3</section>
        <section class="s4">4</section>
        <section class="s5">5</section>
        <section class="s6">6</section>
    </div>
    
</body>
</html>
